services:
  postgres:
    image: postgres:14-alpine
    container_name: hvac_postgres
    environment:
      POSTGRES_DB: hvac_field_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database-schema.sql:/docker-entrypoint-initdb.d/001-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hvac_backend
    environment:
      DB_HOST: postgres
      DB_NAME: hvac_field_os
      DB_USER: postgres
      DB_PASSWORD: password123
      DB_PORT: 5432
      JWT_SECRET: hvac_super_secret_key_2026
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hvac_frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
